name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-armv7l:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Install dependencies
        run: npm ci

      - name: Build and package for armv7l
        run: npm run package:linux-armv7l
        env:
          USE_HARD_LINKS: false
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
          CC_host: gcc
          CXX_host: g++

      - name: Rename to predictable filename
        run: mv dist/*.AppImage dist/coffee-rolodex-armv7l.AppImage

      - name: Publish to GitHub Release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "Latest Build" \
            --notes "Auto-built from master branch" \
            dist/coffee-rolodex-armv7l.AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
